spring:
  application:
    name: donaton-ms-necesidades
  datasource:
    url: jdbc:postgresql://localhost:5432/necesidades_db
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

server:
  port: 8083