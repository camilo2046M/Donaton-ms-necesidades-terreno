spring:
  application:
    name: donaton-ms-necesidades
  datasource:
    url: jdbc:h2:mem:necesidadesdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true

server:
  port: 8083 # Asignamos el 8083 para no chocar con los otros servicios